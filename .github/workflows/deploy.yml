# ============================================
#  deploy.yml - 集享公社用户端自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Build H5
        run: npm run build:h5

      - name: Find and package build output
        run: |
          set -e
          if [ -d "unpackage/dist/build/h5" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C unpackage/dist/build/h5 .
          elif [ -d "dist/build/h5" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C dist/build/h5 .
          elif [ -d "dist" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C dist .
          else
            echo "ERROR: No build output found"
            ls -la
            exit 1
          fi

      - name: Deploy to Server
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/known_hosts -i /tmp/deploy_key jixiang-qianduan-h5.tar.gz root@${{ secrets.DEPLOY_HOST }}:/tmp/
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/known_hosts -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} "mkdir -p /www/jixiang-qianduan/h5 && cd /www/jixiang-qianduan/h5 && tar -xz && nginx -s reload"
