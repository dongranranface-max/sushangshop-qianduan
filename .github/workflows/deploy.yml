# ============================================
#  deploy.yml - UniApp 前端用户端自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build H5
        run: npm run build:h5
        env:
          NODE_ENV: production

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command: |
            set -e
            # UniApp H5 输出在 unpackage/dist/build/h5/
            rsync -avz --delete /home/runner/work/sushangshop-qianduan/sushangshop-qianduan/unpackage/dist/build/h5/ root@127.0.0.1:/www/sushang-qianduan/h5/
            nginx -s reload
