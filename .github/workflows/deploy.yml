# ============================================
#  deploy.yml - 集享公社用户端自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Build H5
        run: |
          rm -rf dist build
          npm run build:h5

      - name: Find and package build output
        run: |
          set -e
          if [ -d "dist/build/h5" ]; then
            echo "Using dist/build/h5"
          elif [ -d "dist" ]; then
            echo "Using dist"
          else
            echo "ERROR: No build output found"
            ls -la
            exit 1
          fi
          echo "Build output verified"

      - name: Deploy to Server
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo '${{ secrets.DEPLOY_SSH_KEY }}' | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/known_hosts -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} "mkdir -p /www/jixiang-qianduan/h5 && rm -rf /www/jixiang-qianduan/h5/*"
          rsync -avz --progress -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/known_hosts -i /tmp/deploy_key" dist/build/h5/ root@${{ secrets.DEPLOY_HOST }}:/www/jixiang-qianduan/h5/
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/known_hosts -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} 'ls -lh /www/jixiang-qianduan/h5/ && nginx -s reload'
