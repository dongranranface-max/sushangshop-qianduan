# ============================================
#  deploy.yml - UniApp 前端用户端自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Build H5
        run: npm run build:h5

      - name: Find and package build output
        run: |
          set -e
          if [ -d "unpackage/dist/build/h5" ]; then
            echo "Using unpackage/dist/build/h5"
            tar -czf sushang-qianduan-h5.tar.gz -C unpackage/dist/build/h5 .
          elif [ -d "dist/build/h5" ]; then
            echo "Using dist/build/h5"
            tar -czf sushang-qianduan-h5.tar.gz -C dist/build/h5 .
          elif [ -d "dist" ]; then
            echo "Using dist"
            tar -czf sushang-qianduan-h5.tar.gz -C dist .
          else
            echo "ERROR: No build output found"
            ls -la
            exit 1
          fi

      - name: Deploy to Server
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem root@${{ secrets.DEPLOY_HOST }} "mkdir -p /www/sushang-qianduan/h5"
          cat sushang-qianduan-h5.tar.gz | ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem root@${{ secrets.DEPLOY_HOST }} "cd /www/sushang-qianduan/h5 && tar -xz && nginx -s reload"
